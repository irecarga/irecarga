
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin | Irecarga.ve</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --bg: #030305; --neon: #00d2ff; --green: #00ff88; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }
        #login-screen { background: rgba(15,15,25,0.95); padding: 40px; border-radius: 20px; border: 1px solid var(--neon); text-align: center; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; font-size: 20px; text-align: center; outline: none; width: 180px; }
        #admin-content { display: none; width: 95%; max-width: 1000px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .table-container { background: rgba(15,15,25,0.95); border-radius: 15px; overflow-x: auto; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { color: var(--neon); padding: 15px; text-align: left; font-family: 'Orbitron'; font-size: 12px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 11px; }
        .btn-view { background: rgba(0,210,255,0.1); border: 1px solid var(--neon); color: var(--neon); }
        .btn-check { background: var(--green); color: #000; margin-left: 8px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2 style="font-family:'Orbitron'; color:var(--neon); margin-bottom:20px;">ADMIN ACCESS</h2>
    <input type="password" id="pass-input" maxlength="6" placeholder="******" oninput="checkPass()">
</div>

<div id="admin-content">
    <div class="header">
        <h1 style="font-family:'Orbitron'; font-size:18px;">PANEL | IRECARGA.VE</h1>
        <button onclick="fetchOrders()" class="btn btn-view">REFRESCAR 🔄</button>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>JUGADOR</th><th>PAQUETE</th><th>MONTO</th><th>REF</th><th>ACCIÓN</th>
                </tr>
            </thead>
            <tbody id="order-body"></tbody>
        </table>
    </div>
</div>

<script>
    // Inicialización de servicios
    emailjs.init("HngK3XNAmlVJW3x2z");
    const _supabase = supabase.createClient("https://vlrryjmiyohkvupkofkz.supabase.co", "sb_publishable_IGiK6-fjl3Xeh3Yr93Z9LA_JGN281YQ");

    function checkPass() {
        if(document.getElementById('pass-input').value === "191124") {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('admin-content').style.display = "block";
            fetchOrders();
        }
    }

    async function fetchOrders() {
        // CORRECCIÓN DEFINITIVA: Se eliminó .order('created_at') para evitar el error de columna inexistente
        const { data, error } = await _supabase
            .from("ventas") 
            .select("*");

        if (error) {
            alert("Error de Supabase: " + error.message);
            return;
        }

        const body = document.getElementById('order-body');
        body.innerHTML = "";
        
        if (!data || data.length === 0) {
            body.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:40px;'>No hay registros aún en la tabla 'ventas'.</td></tr>";
            return;
        }

        data.forEach(order => {
            body.innerHTML += `
                <tr>
                    <td>ID: ${order.player_id}</td>
                    <td>💎 ${order.paquete}</td>
                    <td style="color:var(--green)">${order.monto_bs} Bs</td>
                    <td>${order.referencia}</td>
                    <td>
                        <a href="${order.capture_url}" target="_blank" class="btn btn-view">VER PAGO</a>
                        ${order.status === 'pendiente' ? 
                            `<button onclick="marcarListo('${order.id}', '${order.email_cliente}', '${order.player_id}', '${order.paquete}')" class="btn btn-check">LISTO</button>` 
                            : '✅'}
                    </td>
                </tr>`;
        });
    }

    async function marcarListo(id, email, player, pack) {
        if(!confirm("¿Confirmar acreditación y enviar correo?")) return;
        try {
            // Envío de correo electrónico al cliente
            await emailjs.send('servicio_irecarga', 'template_2nbenso', {
                email_cliente: email,
                player_id: player,
                paquete: pack
            });

            // Actualización del estado en la base de datos
            const { error } = await _supabase
                .from("ventas")
                .update({ status: 'completado' })
                .eq('id', id);

            if (error) throw error;

            alert("¡Éxito! Cliente notificado y tabla actualizada.");
            fetchOrders();
        } catch (err) {
            alert("Hubo un problema: " + err.message);
        }
    }
</script>
</body>
</html>
