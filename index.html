<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irecarga.Ve | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #030305; --blue: #00d2ff; --green: #00ff88; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .card { max-width: 400px; width: 100%; background: rgba(20,20,30,0.9); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { font-family: 'Orbitron'; text-align: center; color: var(--blue); font-size: 22px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--blue); color: #000; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }
        #loader { display: none; color: var(--green); text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>IRECARGA.VE</h1>
    
    <label>ID JUGADOR</label>
    <input type="text" id="p_id" placeholder="ID de Free Fire">

    <label>REFERENCIA (6 DÍGITOS)</label>
    <input type="text" id="ref" placeholder="Ej: 123456">

    <label>SUBIR CAPTURE DE PAGO</label>
    <input type="file" id="foto" accept="image/*">

    <button class="btn" onclick="enviarPedido()">CONFIRMAR PAGO</button>
    <div id="loader">PROCESANDO... POR FAVOR ESPERA.</div>
</div>

<script>
    // Usando tus credenciales de las capturas
    const SUPABASE_URL = "https://vlrryjmiyohkvupkofkz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_IGiK6-fjl3Xeh3Yr93Z9LA_JGN281YQ";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function enviarPedido() {
        const id = document.getElementById('p_id').value;
        const ref = document.getElementById('ref').value;
        const file = document.getElementById('foto').files[0];
        const loader = document.getElementById('loader');

        if(!id || !ref || !file) return alert("Por favor, llena todos los campos y sube la foto.");

        loader.style.display = "block";

        try {
            // 1. Subir la foto al bucket Comprobantes
            const path = `pagos/${Date.now()}_${id}.png`;
            const { data: upData, error: upError } = await _supabase.storage
                .from('Comprobantes')
                .upload(path, file);

            if (upError) throw upError;

            // 2. Obtener el link público de la foto
            const { data: urlData } = _supabase.storage.from('Comprobantes').getPublicUrl(path);

            // 3. Guardar los datos en la tabla irecarga's.ve
            const { error: dbError } = await _supabase
                .from("irecarga's.ve")
                .insert([{
                    player_id: id,
                    referencia: ref,
                    capture_url: urlData.publicUrl,
                    status: 'pendiente'
                }]);

            if (dbError) throw dbError;

            alert("✅ ¡Pago enviado con éxito! Verificaremos tu referencia pronto.");
            location.reload();

        } catch (err) {
            alert("Error al procesar: " + err.message);
            console.error(err);
        } finally {
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
