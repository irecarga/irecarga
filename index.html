<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRECARGA - Pro Gamer Service</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            /* Paleta de colores profesional y moderna */
            --bg-page: #080a11; /* Un negro azulado más profundo y limpio */
            --bg-card: #0e121e; /* Fondo de tarjetas */
            --color-azul: #2563eb; /* Azul principal elegante */
            --color-azul-claro: #3b82f6; /* Azul claro para interactividad */
            --text-blanco: #ffffff; /* Texto principal */
            --text-gris: #9ca3af; /* Texto secundario */
            --border-card: #1f2937; /* Bordes sutiles */
            --accent-glow: #ff1f5b; /* El resplandor rojo original sutil */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body { background: var(--bg-page); color: var(--text-blanco); padding: 20px; display: flex; flex-direction: column; min-height: 100vh; position: relative; overflow-x: hidden; }

        /* Resplandor de fondo neón rojo sutil en la parte superior */
        body::before {
            content: '';
            position: absolute;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 400px;
            background: var(--accent-glow);
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
        }

        .container { max-width: 500px; margin: auto; flex: 1; width: 100%; display: flex; flex-direction: column; }

        /* Sutil logotipo de IRECARGA en el pie de página */
        footer { text-align: center; padding: 40px 0 20px; margin-top: auto; border-top: 1px solid var(--border-card); }
        .footer-copy { font-size: 14px; color: var(--text-gris); margin-bottom: 8px; }
        .footer-links { font-size: 14px; color: var(--text-gris); display: flex; justify-content: center; gap: 20px; }

        /* Pasos de compra sutiles - Función Nueva */
        .purchase-steps { display: flex; justify-content: space-between; margin-bottom: 30px; font-size: 12px; color: var(--text-gris); text-transform: uppercase; letter-spacing: 1.5px; }
        .step { position: relative; width: 33%; text-align: center; }
        .step.active { color: var(--color-azul-claro); font-weight: 600; }
        .step:not(:last-child)::after { content: ''; position: absolute; top: 50%; right: -50%; width: 100%; height: 1px; background: var(--border-card); transform: translateY(-50%); }

        /* Sección de Identificación con icono alineado por encima */
        .section-identification { margin-bottom: 25px; }
        .identification-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .ff-icon { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--accent-glow); box-shadow: 0 0 10px rgba(255, 31, 91, 0.4); }
        .section-identification h2 { font-size: 16px; font-weight: 600; color: var(--text-blanco); }

        /* Input de ID con verificador sutil - Función Nueva */
        .id-input-container { position: relative; }
        .id-verificador { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-gris); pointer-events: none; }
        .id-verificador.valid { color: #22c55e; }
        .id-verificador.invalid { color: #ef4444; }

        .input-box { width: 100%; background: var(--bg-card); border: 2px solid var(--border-card); padding: 16px; padding-right: 40px; color: var(--text-blanco); border-radius: 12px; font-size: 15px; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--color-azul); box-shadow: 0 0 10px rgba(37, 99, 235, 0.2); }

        /* Sección de selección de diamantes optimizada (SIN CANDADOS) */
        .section-packages h2 { font-size: 16px; font-weight: 600; color: var(--text-blanco); margin-bottom: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        
        .card { background: var(--bg-card); border: 2px solid var(--border-card); padding: 18px; text-align: center; cursor: pointer; border-radius: 12px; transition: 0.3s; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--color-azul-claro); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(37, 130, 246, 0.1); }
        .card.selected { border-color: var(--color-azul); background: rgba(37, 99, 235, 0.1); box-shadow: 0 0 15px rgba(37, 99, 235, 0.3); }

        /* Barra de progreso de diamantes - Función Nueva */
        .diamond-progress { width: 100%; height: 3px; background: var(--border-card); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--color-azul-claro); transition: width 0.3s ease; }

        .card strong { display: block; font-size: 20px; font-weight: 800; margin-bottom: 4px; color: var(--text-blanco); }
        .card span { color: var(--text-gris); font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* Icono de descuento/oferta sutil - Función Nueva */
        .offer-tag { position: absolute; top: -1px; right: -1px; background: var(--color-azul); color: white; font-size: 10px; font-weight: 700; padding: 3px 6px; border-radius: 0 11px 0 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0; transition: 0.3s; }
        .card:hover .offer-tag { opacity: 1; }
        .card.special .offer-tag { opacity: 1; } /* Forzar mostrar en paquetes especiales */

        /* Sección de Pago con diseño más integrado */
        .section-payment { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 14px; padding: 20px; margin-top: 10px; border-left: 4px solid var(--color-azul); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* Temporizador optimizado */
        .timer-box { display: flex; justify-content: space-between; align-items: center; background: rgba(34, 197, 94, 0.05); padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #166534; }
        .timer-label { font-size: 13px; color: var(--text-blanco); display: flex; align-items: center; gap: 8px; }
        #timer { color: #4ade80; font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }

        /* Datos de pago móvil con diseño más sutil */
        .section-payment h3 { font-size: 16px; font-weight: 600; color: var(--text-blanco); margin-bottom: 12px; }
        .payment-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-card); }
        .payment-row:last-child { border-bottom: none; }
        .data-label { font-size: 14px; color: var(--text-blanco); display: flex; align-items: center; gap: 8px; }
        .data-label i { color: var(--color-azul-claro); font-size: 16px; width: 20px; text-align: center; }

        /* Botones de copiar */
        .copy-btn { background: #1e293b; color: var(--text-blanco); border: 1px solid var(--border-card); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .copy-btn:hover { background: var(--color-azul-claro); border-color: var(--color-azul-claro); }
        .copy-all { background: #1e293b; color: var(--text-blanco); width: 100%; border: 1px solid var(--border-card); padding: 14px; border-radius: 8px; margin-top: 15px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .copy-all:hover { background: var(--color-azul); border-color: var(--color-azul); }

        /* Botón Principal de WhatsApp */
        .btn-wha { background: var(--color-azul); color: var(--text-blanco); width: 100%; padding: 16px; border: none; font-weight: 700; text-transform: uppercase; border-radius: 12px; font-size: 16px; cursor: pointer; margin-top: 20px; transition: 0.2s; letter-spacing: 1px; }
        .btn-wha:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">

    <div class="purchase-steps">
        <div class="step active">ID</div>
        <div class="step">Paquete</div>
        <div class="step">Pago</div>
    </div>

    <section class="section-identification">
        <div class="identification-header">
            <img src="https://i.ibb.co/L5rK5Q2/free-fire-icon.png" alt="Free Fire" class="ff-icon">
            <h2>Identificación</h2>
        </div>
        <div class="id-input-container">
            <input type="text" id="playerID" class="input-box" placeholder="Ingresa tu ID de Garena" oninput="validarID()">
            <div id="verificadorStatus" class="id-verificador"></div> </div>
    </section>

    <section class="section-packages">
        <h2>Selecciona tu Paquete</h2>
        <div class="grid" id="diamondGrid">
            </div>
    </section>

    <div id="pago-section" class="hidden section-payment">
        <div class="timer-box">
            <span class="timer-label"><i class="fa-solid fa-hourglass-start"></i> Tiempo para pagar:</span>
            <span id="timer">27:30</span>
        </div>

        <h3>Datos de Pago Móvil</h3>
        <div class="payment-row">
            <span class="data-label"><i class="fa-solid fa-bank"></i> BANESCO (0134)</span>
            <button class="copy-btn" onclick="copy('0134')">Copiar</button>
        </div>
        <div class="payment-row">
            <span class="data-label"><i class="fa-solid fa-user"></i> Banesco CI: 30.870.489</span>
            <button class="copy-btn" onclick="copy('30870489')">Copiar</button>
        </div>
        <div class="payment-row">
            <span class="data-label"><i class="fa-solid fa-phone"></i> 0424-8018068</span>
            <button class="copy-btn" onclick="copy('04248018068')">Copiar</button>
        </div>
        <button class="copy-all" onclick="copyAll()">Copiar todos los datos</button>

        <button type="button" class="btn-wha" onclick="enviar()">
            Finalizar Pedido en WhatsApp
        </button>
    </div>

    <footer>
        <div class="footer-copy">© 2026 IRECARGA – Pro Gamer Service</div>
        <div class="footer-links">
            <span>Condiciones de servicio</span>
            <span>Política de privacidad</span>
        </div>
    </footer>
</div>

<script>
    // Configuración de Paquetes
    const paquetes = [
        { d: '110', p: '599', special: false }, { d: '220', p: '1.210', special: false },
        { d: '341', p: '1.896', special: true }, { d: '572', p: '2.993', special: false },
        { d: '1166', p: '5.513', special: false }, { d: '2398', p: '11.025', special: false }
    ];

    const grid = document.getElementById('diamondGrid');
    
    // Función para validar ID sutil - Función Nueva
    function validarID() {
        const idInput = document.getElementById('playerID');
        const verificadorStatus = document.getElementById('verificadorStatus');
        if (idInput.value.length === 10) { // Un ejemplo de longitud de ID
            verificadorStatus.innerHTML = '<i class="fa-solid fa-check-circle valid"></i>';
            updateStep(1); // Mover al paso del paquete
        } else if (idInput.value.length > 0) {
            verificadorStatus.innerHTML = '<i class="fa-solid fa-circle valid" style="color: var(--text-gris); font-size: 8px;"></i>';
            updateStep(0); // Volver al paso de ID
        } else {
            verificadorStatus.innerHTML = '';
            updateStep(0);
        }
    }

    // Función para actualizar los pasos de compra - Función Nueva
    function updateStep(index) {
        const steps = document.querySelectorAll('.step');
        steps.forEach((step, i) => {
            if (i === index) {
                step.classList.add('active');
            } else {
                step.classList.remove('active');
            }
        });
    }

    // Generar paquetes dinámicamente
    paquetes.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = `card ${item.special ? 'special' : ''}`;
        
        // Etiqueta de oferta sutil - Función Nueva
        const offerTag = item.special ? '<div class="offer-tag">Oferta Especial</div>' : '<div class="offer-tag">Mejor Valor</div>';
        
        // Barra de progreso de diamantes sutil - Función Nueva
        const maxDiams = paquetes[paquetes.length - 1].d;
        const progressWidth = (parseInt(item.d) / parseInt(maxDiams)) * 100;
        const progressFill = `<div class="diamond-progress"><div class="progress-fill" style="width: ${progressWidth}%"></div></div>`;

        card.innerHTML = `${offerTag}<strong>${item.d}</strong>${progressFill}<span>Bs ${item.p} <i class="fa-solid fa-diamond" style="color: var(--color-azul-claro); font-size: 10px;"></i></span>`;
        
        // El paquete 110 está preseleccionado en tu referencia
        if (index === 0) {
            card.classList.add('selected');
            document.getElementById('h_diams').value = item.d;
            document.getElementById('h_monto').value = item.p;
        }

        card.onclick = () => {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            document.getElementById('h_diams').value = item.d;
            document.getElementById('h_monto').value = item.p;
            document.getElementById('pago-section').classList.remove('hidden');
            startTimer(1800); // 30 Minutos exactos
            updateStep(2); // Mover al paso de pago
        };
        grid.appendChild(card);
    });

    // Función de Copiado
    function copy(text) {
        navigator.clipboard.writeText(text);
        alert("¡Copiado! " + text);
    }

    // Función de Copiado Completo
    function copyAll() {
        const textToCopy = 'Banco: Banesco (0134), CI: 30.870.489, Teléfono: 0424-8018068';
        navigator.clipboard.writeText(textToCopy);
        alert("¡Todos los datos copiados al portapapeles!");
    }

    // Cuenta Regresiva optimizada
    let timerInterval;
    function startTimer(duration) {
        if (timerInterval) clearInterval(timerInterval); // Limpiar temporizador anterior si existe
        let timer = duration, minutes, seconds;
        const display = document.querySelector('#timer');
        timerInterval = setInterval(function () {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;
            display.textContent = minutes + ":" + seconds;
            if (--timer < 0) clearInterval(timerInterval);
        }, 1000);
    }

    // Envío de WhatsApp
    function enviar() {
        const id = document.getElementById('playerID').value;
        const d = document.getElementById('h_diams').value;
        const m = document.getElementById('h_monto').value;
        if (!id) return alert("Por favor, ingresa tu ID de Garena.");
        if (!d) return alert("Por favor, selecciona un paquete.");
        const msj = `*🛰️ NUEVO PEDIDO IRECARGA*%0A*ID:* \`${id}\` %0A*PAQUETE:* ${d} Diamantes 💎%0A*MONTO:* Bs ${m}%0A_Hola Isaías, envío el pago para mi recarga._`;
        window.open(`https://api.whatsapp.com/send?phone=584248018068&text=${msj}`, '_blank');
    }
</script>
<input type="hidden" id="h_diams"><input type="hidden" id="h_monto">
</body>
</html>
